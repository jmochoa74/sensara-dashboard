<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>SENSARA Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"><\/script>
<style>
:root{--g:#6db33f;--dg:#4e8c28;--deep:#1a2e0f;--lg:#eaf4df;--w:#fff;--ow:#f7faf3;--gray:#8a9e7c;--dark:#1c2a14;--bdr:#d4e8c0;--red:#c0392b;--amb:#e67e22;--blu:#2471a3;--pur:#8e44ad;--teal:#16a085}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--ow);color:var(--dark);min-height:100vh}
header{background:var(--deep);padding:14px 28px;display:flex;align-items:center;gap:14px;border-bottom:3px solid var(--g);position:sticky;top:0;z-index:100}
.logo{width:36px;height:36px;background:var(--g);border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:900;color:#fff;font-size:16px}
header h1{color:#fff;font-size:17px;font-weight:700}
header p{color:var(--gray);font-size:11px;margin-top:2px}
.badge{padding:3px 12px;border-radius:20px;font-size:11px;font-weight:700;background:rgba(109,179,63,.2);color:var(--g);margin-left:auto}
#refresh-btn{padding:6px 14px;border:1px solid var(--g);border-radius:8px;background:transparent;color:var(--g);font-size:12px;cursor:pointer;font-weight:600;margin-left:10px}
.wrap{max-width:1300px;margin:0 auto;padding:20px 24px}
.panel{background:var(--w);border:1px solid var(--bdr);border-radius:12px;overflow:hidden;margin-bottom:18px}
.ph{padding:13px 20px;border-bottom:1px solid var(--bdr);display:flex;align-items:center;justify-content:space-between}
.ph h3{font-size:13px;font-weight:700}.ph span{font-size:11px;color:var(--gray)}
.pb{padding:18px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
.g5{display:grid;grid-template-columns:repeat(5,1fr);gap:12px}
.kpi{background:var(--ow);border:1px solid var(--bdr);border-radius:11px;padding:16px;border-top:3px solid var(--g)}
.kl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--gray);margin-bottom:7px}
.kv{font-size:23px;font-weight:800;letter-spacing:-1px;line-height:1}
.ks{font-size:11px;color:var(--gray);margin-top:5px}
.cw{position:relative;height:220px}.cw.t{height:260px}
.ac{border-radius:10px;padding:14px;border:1px solid var(--bdr)}
.bb{height:9px;background:var(--lg);border-radius:9px;overflow:hidden;position:relative;margin:3px 0 5px}
.bf{height:100%;border-radius:9px;transition:width .5s}
.bf2{position:absolute;top:0;left:0;height:100%;border-radius:9px;opacity:.35}
.sem{padding:10px 14px;border-radius:0 10px 10px 0;margin-bottom:12px;font-size:12px}
.sem.verde{background:#eafaf1;border-left:4px solid #27ae60}
.sem.ambar{background:#fef9e7;border-left:4px solid var(--amb)}
.sem.rojo{background:#fdecea;border-left:4px solid var(--red)}
.hs{display:flex;gap:10px;overflow-x:auto;padding-bottom:6px;margin-bottom:14px}
.hc{flex-shrink:0;width:130px;background:var(--ow);border:1.5px solid var(--bdr);border-radius:10px;padding:12px}
.hc.cur{background:var(--lg);border-color:var(--g)}
.pi{border:1px solid var(--bdr);border-radius:10px;padding:12px;margin-bottom:8px;background:var(--ow)}
.pn{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin:8px 0}
.pnl{font-size:10px;color:var(--gray);margin-bottom:2px}.pnv{font-size:13px;font-weight:800;color:var(--dg)}
.gt{width:100%;border-collapse:collapse;font-size:12px;margin-bottom:8px}
.gt th{background:var(--deep);color:#fff;padding:7px 8px;font-size:10px;font-weight:700;text-transform:uppercase}
.gt th:not(:first-child){text-align:center}
.gt td{padding:5px 4px;border-bottom:1px solid #f0f5eb}
.gt input{width:64px;padding:4px 6px;border:1.5px solid var(--bdr);border-radius:6px;text-align:center;font-size:12px;font-weight:700}
.cl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--gray);display:block;margin-bottom:5px}
.cr{display:flex;align-items:center;gap:8px}.cr input[type=range]{flex:1}
.cv{font-size:15px;font-weight:800;min-width:55px;text-align:right}
.ps{border-radius:11px;padding:16px;border:2px solid var(--bdr);margin-bottom:10px}
.pf{display:none;margin-top:10px;padding:14px;border:1.5px solid var(--g);border-radius:10px;background:var(--lg)}
.fi{width:100%;padding:7px 9px;border:1px solid var(--bdr);border-radius:7px;font-size:12px;margin-bottom:8px}
#loading{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(26,46,15,.88);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;color:#fff}
.sp{width:48px;height:48px;border:4px solid rgba(109,179,63,.3);border-top-color:var(--g);border-radius:50%;animation:spin 1s linear infinite;margin-bottom:16px}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div id="loading"><div class="sp"></div><div style="font-size:14px;font-weight:700">Cargando datos de Holded...</div></div>

<header>
  <div class="logo">SN</div>
  <div><h1>SENSARA — Dashboard Financiero</h1><p>Datos en tiempo real desde Holded</p></div>
  <span class="badge" id="sync-badge">Cargando...</span>
  <button id="refresh-btn" onclick="loadData()">↺ Actualizar</button>
</header>

<div class="wrap">
<div class="g4" id="kpis" style="margin-bottom:18px"></div>

<!-- TESORERÍA -->
<div class="panel">
  <div class="ph"><h3>🏦 Tesorería</h3><span id="tesoro-sub">Cargando...</span></div>
  <div class="pb">
    <div class="g4" id="tesoro-kpis" style="margin-bottom:16px"></div>
    <div class="g2">
      <div>
        <div style="font-size:12px;font-weight:700;color:var(--dark);margin-bottom:10px">Saldo por cuenta</div>
        <div id="tesoro-cuentas"></div>
      </div>
      <div>
        <div style="font-size:12px;font-weight:700;color:var(--dark);margin-bottom:10px">Posición de caja</div>
        <div id="tesoro-posicion"></div>
      </div>
    </div>
  </div>
</div>
<div class="panel">
  <div class="ph"><h3>📅 Evolución histórica</h3><span>Ibarra 2022-2025 + Holded</span></div>
  <div class="pb"><div class="hs" id="hcards"></div>
    <div class="g2"><div><div class="cw t"><canvas id="ch1"></canvas></div></div><div><div class="cw t"><canvas id="ch2"></canvas></div></div></div>
  </div>
</div>
<div class="panel">
  <div class="ph"><h3>Ingresos por área</h3><span id="asub"></span></div>
  <div class="pb"><div class="g5" id="acards" style="margin-bottom:14px"></div><div class="cw"><canvas id="ch3"></canvas></div></div>
</div>
<div class="panel">
  <div class="ph"><h3>🎯 Pipeline comercial</h3><span>✅ Se guarda automáticamente en el servidor</span></div>
  <div class="pb">
    <div class="g4" id="pkk" style="margin-bottom:18px"></div>
    <div class="g2">
      <div>
        <div style="font-size:12px;font-weight:700;margin-bottom:10px">Oportunidades activas</div>
        <div id="pklist"></div>
        <button type="button" id="bpadd" style="width:100%;margin-top:8px;padding:9px;border:1.5px dashed var(--bdr);border-radius:9px;background:var(--ow);color:var(--gray);font-size:12px;cursor:pointer;font-weight:600">+ Añadir oportunidad</button>
        <div class="pf" id="pkform">
          <div style="font-size:13px;font-weight:700;color:var(--dg);margin-bottom:10px">Nueva oportunidad</div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
            <div><div style="font-size:11px;color:var(--gray);margin-bottom:3px">Nombre *</div><input class="fi" id="pkn" type="text"></div>
            <div><div style="font-size:11px;color:var(--gray);margin-bottom:3px">Importe € *</div><input class="fi" id="pki" type="number"></div>
            <div><div style="font-size:11px;color:var(--gray);margin-bottom:3px">Área</div>
              <select class="fi" id="pka"><option>Respirómetros</option><option>Sensores</option><option>Analizadores</option><option>Consultoría ENAC</option><option>Consultoría</option></select></div>
            <div><div style="font-size:11px;color:var(--gray);margin-bottom:3px">Nota</div><input class="fi" id="pknota" type="text"></div>
          </div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:8px 0 12px">
            <div><div style="display:flex;justify-content:space-between;margin-bottom:3px"><span style="font-size:11px;color:var(--gray)">Probabilidad</span><span id="pkpl" style="font-size:12px;font-weight:800;color:var(--g)">50%</span></div>
              <input type="range" id="pkp" min="0" max="100" value="50" style="width:100%;accent-color:var(--g)" oninput="document.getElementById('pkpl').textContent=this.value+'%'"></div>
            <div><div style="display:flex;justify-content:space-between;margin-bottom:3px"><span style="font-size:11px;color:var(--gray)">% INCONEF</span><span id="pkil" style="font-size:12px;font-weight:800;color:var(--amb)">50%</span></div>
              <input type="range" id="pkic" min="0" max="80" value="50" style="width:100%;accent-color:var(--amb)" oninput="document.getElementById('pkil').textContent=this.value+'%'"></div>
          </div>
          <div style="display:flex;gap:8px">
            <button type="button" id="bpsave" style="flex:1;padding:9px;background:var(--g);color:#fff;border:none;border-radius:8px;font-weight:700;font-size:13px;cursor:pointer">Añadir</button>
            <button type="button" id="bpcancel" style="flex:1;padding:9px;background:var(--w);border:1px solid var(--bdr);border-radius:8px;font-size:13px;cursor:pointer">Cancelar</button>
          </div>
        </div>
      </div>
      <div>
        <div style="font-size:12px;font-weight:700;margin-bottom:10px">Escenarios de cierre</div>
        <div id="pkesc"></div>
        <div style="font-size:12px;font-weight:700;margin:14px 0 10px">Impacto en año actual</div>
        <div id="pkimp"></div>
      </div>
    </div>
  </div>
</div>
<div class="panel">
  <div class="ph"><h3>📊 Seguimiento vs objetivo</h3><span>Objetivo = año anterior × % Base</span></div>
  <div class="pb">
    <div id="semg" style="margin-bottom:12px"></div>
    <div class="g4" id="segk" style="margin-bottom:16px"></div>
    <div class="bb" style="height:12px;margin-bottom:4px"><div class="bf2" id="spipe" style="width:0;background:var(--g)"></div><div class="bf" id="sreal" style="width:0;background:var(--g)"></div></div>
    <div style="display:flex;justify-content:space-between;font-size:10px;color:var(--gray);margin-bottom:16px"><span id="sfl"></span><span id="sfr"></span></div>
    <div id="sarea"></div>
    <div style="margin-top:16px">
      <div style="font-size:12px;font-weight:700;margin-bottom:8px">% crecimiento por área sobre año anterior</div>
      <table class="gt"><thead><tr><th>Área</th><th style="color:#f1948a">🔴 Cons.</th><th style="color:#f8c471">🟡 Base</th><th style="color:#82e0aa">🟢 Opt.</th></tr></thead><tbody id="gtb"></tbody></table>
    </div>
  </div>
</div>
<div class="panel">
  <div class="ph"><h3>📈 Proyección año actual</h3><span>Base: año anterior × % por área</span></div>
  <div class="pb">
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:18px;margin-bottom:20px">
      <div><span class="cl">Retribución JM anual</span><div class="cr"><input type="range" id="sjm" min="0" max="150000" value="82000" step="1000" style="accent-color:var(--blu)" oninput="onSl()"><span class="cv" id="vjm" style="color:var(--blu)">82k€</span></div></div>
      <div><span class="cl">INCONEF % s/ventas resp.</span><div class="cr"><input type="range" id="sinc" min="20" max="70" value="50" style="accent-color:var(--amb)" oninput="onSl()"><span class="cv" id="vinc" style="color:var(--amb)">50%</span></div></div>
      <div><span class="cl">Variación OPEX</span><div class="cr"><input type="range" id="sopx" min="-30" max="50" value="0" step="5" style="accent-color:var(--g)" oninput="onSl()"><span class="cv" id="vopx">0%</span></div></div>
    </div>
    <div class="g3" id="prjc"></div>
  </div>
</div>
</div>

<!-- ── FACTURACIÓN ─────────────────────────────────────── -->
<div class="panel" style="margin-top:18px">
  <div class="ph">
    <h3>📄 Facturación y presupuestos</h3>
    <span id="fact-sub">Cargando...</span>
  </div>
  <div class="pb">
    <!-- KPIs -->
    <div class="g4" id="fact-kpis" style="margin-bottom:16px"></div>
    <!-- Tabs estado -->
    <div style="display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap">
      <button type="button" class="fact-tab active" data-estado="todos" style="padding:6px 12px;border-radius:7px;font-size:12px;font-weight:600;cursor:pointer;border:1.5px solid var(--g);background:var(--lg);color:var(--dg)">Todos</button>
      <button type="button" class="fact-tab" data-estado="emitida" style="padding:6px 12px;border-radius:7px;font-size:12px;font-weight:600;cursor:pointer;border:1.5px solid var(--bdr);background:var(--ow);color:var(--gray)">Emitidas</button>
      <button type="button" class="fact-tab" data-estado="cobrada" style="padding:6px 12px;border-radius:7px;font-size:12px;font-weight:600;cursor:pointer;border:1.5px solid var(--bdr);background:var(--ow);color:var(--gray)">Cobradas</button>
      <button type="button" class="fact-tab" data-estado="presupuesto" style="padding:6px 12px;border-radius:7px;font-size:12px;font-weight:600;cursor:pointer;border:1.5px solid var(--bdr);background:var(--ow);color:var(--gray)">Presupuestos</button>
    </div>
    <!-- Lista documentos -->
    <div id="fact-lista"></div>
    <!-- Botón nuevo -->
    <div style="display:flex;gap:10px;margin-top:12px">
      <button type="button" id="btn-nueva-factura" style="padding:8px 16px;background:var(--g);color:#fff;border:none;border-radius:8px;font-weight:700;font-size:12px;cursor:pointer">+ Nueva factura</button>
      <button type="button" id="btn-nuevo-presupuesto" style="padding:8px 16px;background:var(--ow);border:1px solid var(--bdr);border-radius:8px;font-size:12px;cursor:pointer;font-weight:600">+ Nuevo presupuesto</button>
    </div>
    <!-- Formulario nuevo documento -->
    <div id="fact-form" style="display:none;margin-top:14px;padding:16px;border:1.5px solid var(--g);border-radius:10px;background:var(--lg)">
      <div style="font-size:13px;font-weight:700;color:var(--dg);margin-bottom:12px" id="fact-form-title">Nueva factura</div>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:10px">
        <div>
          <div style="font-size:11px;color:var(--gray);margin-bottom:3px">Cliente *</div>
          <select class="fi" id="fact-cliente"><option value="">-- Selecciona cliente --</option></select>
        </div>
        <div>
          <div style="font-size:11px;color:var(--gray);margin-bottom:3px">Fecha</div>
          <input class="fi" id="fact-fecha" type="date">
        </div>
        <div>
          <div style="font-size:11px;color:var(--gray);margin-bottom:3px">Fecha vencimiento</div>
          <input class="fi" id="fact-vto" type="date">
        </div>
        <div>
          <div style="font-size:11px;color:var(--gray);margin-bottom:3px">IVA %</div>
          <select class="fi" id="fact-iva">
            <option value="21">21%</option>
            <option value="0">0% (intracomunitario)</option>
            <option value="10">10%</option>
            <option value="4">4%</option>
          </select>
        </div>
        <div>
          <div style="font-size:11px;color:var(--gray);margin-bottom:3px">Descuento %</div>
          <input class="fi" id="fact-dto" type="number" value="0" min="0" max="100">
        </div>
        <div>
          <div style="font-size:11px;color:var(--gray);margin-bottom:3px">Tags (área)</div>
          <select class="fi" id="fact-tags">
            <option value="respirometria">Respirómetros</option>
            <option value="enac">Consultoría ENAC</option>
            <option value="delfino">Sensores</option>
            <option value="consultoria">Consultoría</option>
            <option value="analizadores">Analizadores</option>
          </select>
        </div>
      </div>
      <!-- Líneas -->
      <div style="font-size:12px;font-weight:700;margin-bottom:8px">Líneas</div>
      <div id="fact-lineas"></div>
      <button type="button" id="btn-add-linea" style="padding:6px 14px;border:1.5px dashed var(--bdr);border-radius:7px;background:var(--w);font-size:12px;cursor:pointer;margin-bottom:10px">+ Añadir línea</button>
      <!-- Totales -->
      <div id="fact-totales" style="background:var(--w);border-radius:8px;padding:12px;margin-bottom:10px;font-size:13px"></div>
      <!-- Notas -->
      <div style="font-size:11px;color:var(--gray);margin-bottom:3px">Notas / condiciones de pago</div>
      <textarea class="fi" id="fact-notas" rows="2" style="resize:vertical;font-family:inherit"></textarea>
      <div style="display:flex;gap:8px;margin-top:10px">
        <button type="button" id="btn-fact-save" style="padding:9px 20px;background:var(--g);color:#fff;border:none;border-radius:8px;font-weight:700;font-size:13px;cursor:pointer">Guardar</button>
        <button type="button" id="btn-fact-cancel" style="padding:9px 16px;background:var(--w);border:1px solid var(--bdr);border-radius:8px;font-size:13px;cursor:pointer">Cancelar</button>
      </div>
    </div>
    <!-- Vista previa PDF -->
    <div id="fact-preview" style="display:none;margin-top:14px"></div>
  </div>
</div>

<!-- ── GASTOS ─────────────────────────────────────────────── -->
<div class="panel" style="margin-top:18px">
  <div class="ph">
    <h3>💸 Gastos</h3>
    <span id="gasto-sub">Cargando...</span>
  </div>
  <div class="pb">
    <div class="g4" id="gasto-kpis" style="margin-bottom:16px"></div>
    <div id="gasto-lista"></div>
    <button type="button" id="btn-nuevo-gasto" style="margin-top:10px;padding:8px 16px;background:var(--g);color:#fff;border:none;border-radius:8px;font-weight:700;font-size:12px;cursor:pointer">+ Registrar gasto</button>
    <div id="gasto-form" style="display:none;margin-top:12px;padding:14px;border:1.5px solid var(--amb);border-radius:10px;background:#fef9e7">
      <div style="font-size:13px;font-weight:700;color:var(--amb);margin-bottom:10px">Nuevo gasto</div>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:10px">
        <div>
          <div style="font-size:11px;color:var(--gray);margin-bottom:3px">Fecha</div>
          <input class="fi" id="g-fecha" type="date">
        </div>
        <div>
          <div style="font-size:11px;color:var(--gray);margin-bottom:3px">Proveedor</div>
          <input class="fi" id="g-proveedor" type="text" placeholder="Nombre proveedor">
        </div>
        <div>
          <div style="font-size:11px;color:var(--gray);margin-bottom:3px">Categoría contable</div>
          <select class="fi" id="g-cat">
            <option value="607">607 — INCONEF fabricación</option>
            <option value="600">600 — Materiales/componentes</option>
            <option value="621">621 — Alquiler local</option>
            <option value="623">623 — Servicios profesionales</option>
            <option value="624">624 — Transportes</option>
            <option value="625">625 — Seguros</option>
            <option value="626">626 — Servicios bancarios</option>
            <option value="627">627 — Publicidad/marketing</option>
            <option value="628">628 — Suministros</option>
            <option value="629">629 — Otros servicios</option>
            <option value="631">631 — Tributos/tasas</option>
            <option value="680">680 — Amortizaciones</option>
          </select>
        </div>
        <div>
          <div style="font-size:11px;color:var(--gray);margin-bottom:3px">Base imponible (€) *</div>
          <input class="fi" id="g-base" type="number" step="0.01" placeholder="0.00">
        </div>
        <div>
          <div style="font-size:11px;color:var(--gray);margin-bottom:3px">IVA %</div>
          <select class="fi" id="g-iva">
            <option value="21">21%</option>
            <option value="0">0%</option>
            <option value="10">10%</option>
          </select>
        </div>
        <div>
          <div style="font-size:11px;color:var(--gray);margin-bottom:3px">Nº factura proveedor</div>
          <input class="fi" id="g-numfact" type="text">
        </div>
        <div style="grid-column:span 3">
          <div style="font-size:11px;color:var(--gray);margin-bottom:3px">Descripción</div>
          <input class="fi" id="g-desc" type="text" placeholder="Descripción del gasto">
        </div>
      </div>
      <div style="display:flex;gap:8px">
        <button type="button" id="btn-gasto-save" style="padding:9px 20px;background:var(--amb);color:#fff;border:none;border-radius:8px;font-weight:700;font-size:13px;cursor:pointer">Guardar</button>
        <button type="button" id="btn-gasto-cancel" style="padding:9px 16px;background:var(--w);border:1px solid var(--bdr);border-radius:8px;font-size:13px;cursor:pointer">Cancelar</button>
      </div>
    </div>
  </div>
</div>

<div class="panel" style="margin-top:18px">
  <div class="ph">
    <h3>📦 Inventario</h3>
    <span id="inv-sub">Cargando...</span>
  </div>
  <div class="pb">
    <!-- Alertas stock mínimo -->
    <div id="inv-alertas" style="margin-bottom:12px"></div>
    <!-- Tabs categorías -->
    <div id="inv-tabs" style="display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap"></div>
    <!-- Tabla stock -->
    <div id="inv-tabla"></div>
    <!-- Botones acción -->
    <div style="display:flex;gap:10px;margin-top:14px;flex-wrap:wrap">
      <button type="button" id="btn-inv-mov" style="padding:8px 16px;background:var(--g);color:#fff;border:none;border-radius:8px;font-weight:700;font-size:12px;cursor:pointer">± Registrar movimiento</button>
      <button type="button" id="btn-inv-add" style="padding:8px 16px;background:var(--ow);border:1px solid var(--bdr);border-radius:8px;font-size:12px;cursor:pointer;font-weight:600">+ Añadir producto</button>
      <button type="button" id="btn-inv-hist" style="padding:8px 16px;background:var(--ow);border:1px solid var(--bdr);border-radius:8px;font-size:12px;cursor:pointer;font-weight:600">📋 Historial</button>
    </div>
    <!-- Formulario movimiento -->
    <div id="inv-form-mov" style="display:none;margin-top:12px;padding:14px;border:1.5px solid var(--g);border-radius:10px;background:var(--lg)">
      <div style="font-size:13px;font-weight:700;color:var(--dg);margin-bottom:10px">Registrar movimiento</div>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:10px">
        <div>
          <div style="font-size:11px;color:var(--gray);margin-bottom:3px">Categoría</div>
          <select class="fi" id="mov-cat" onchange="onMovCatChange()"></select>
        </div>
        <div>
          <div style="font-size:11px;color:var(--gray);margin-bottom:3px">Producto</div>
          <select class="fi" id="mov-prod"></select>
        </div>
        <div>
          <div style="font-size:11px;color:var(--gray);margin-bottom:3px">Tipo</div>
          <select class="fi" id="mov-tipo">
            <option value="entrada">📥 Entrada</option>
            <option value="salida">📤 Salida</option>
          </select>
        </div>
        <div>
          <div style="font-size:11px;color:var(--gray);margin-bottom:3px">Cantidad</div>
          <input class="fi" id="mov-qty" type="number" min="1" value="1">
        </div>
        <div style="grid-column:span 2">
          <div style="font-size:11px;color:var(--gray);margin-bottom:3px">Motivo (opcional)</div>
          <input class="fi" id="mov-motivo" type="text" placeholder="Ej: Instalación cliente XYZ, Compra INCONEF...">
        </div>
      </div>
      <div style="display:flex;gap:8px">
        <button type="button" id="btn-mov-save" style="padding:9px 20px;background:var(--g);color:#fff;border:none;border-radius:8px;font-weight:700;font-size:13px;cursor:pointer">Guardar</button>
        <button type="button" id="btn-mov-cancel" style="padding:9px 16px;background:var(--w);border:1px solid var(--bdr);border-radius:8px;font-size:13px;cursor:pointer">Cancelar</button>
      </div>
    </div>
    <!-- Formulario nuevo producto -->
    <div id="inv-form-add" style="display:none;margin-top:12px;padding:14px;border:1.5px solid var(--blu);border-radius:10px;background:#eaf2fb">
      <div style="font-size:13px;font-weight:700;color:var(--blu);margin-bottom:10px">Nuevo producto</div>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:10px">
        <div><div style="font-size:11px;color:var(--gray);margin-bottom:3px">Categoría</div><select class="fi" id="add-cat"></select></div>
        <div><div style="font-size:11px;color:var(--gray);margin-bottom:3px">Referencia</div><input class="fi" id="add-ref" type="text" placeholder="SN8-PRO"></div>
        <div><div style="font-size:11px;color:var(--gray);margin-bottom:3px">Nombre *</div><input class="fi" id="add-nombre" type="text" placeholder="Nombre del producto"></div>
        <div><div style="font-size:11px;color:var(--gray);margin-bottom:3px">Stock inicial</div><input class="fi" id="add-stock" type="number" value="0" min="0"></div>
        <div><div style="font-size:11px;color:var(--gray);margin-bottom:3px">Stock mínimo</div><input class="fi" id="add-minimo" type="number" value="1" min="0"></div>
        <div><div style="font-size:11px;color:var(--gray);margin-bottom:3px">Unidad</div><input class="fi" id="add-unidad" type="text" value="ud"></div>
        <div><div style="font-size:11px;color:var(--gray);margin-bottom:3px">Precio coste (€)</div><input class="fi" id="add-precio" type="number" value="0" min="0"></div>
        <div style="grid-column:span 2"><div style="font-size:11px;color:var(--gray);margin-bottom:3px">Notas</div><input class="fi" id="add-notas" type="text"></div>
      </div>
      <div style="display:flex;gap:8px">
        <button type="button" id="btn-add-save" style="padding:9px 20px;background:var(--blu);color:#fff;border:none;border-radius:8px;font-weight:700;font-size:13px;cursor:pointer">Añadir</button>
        <button type="button" id="btn-add-cancel" style="padding:9px 16px;background:var(--w);border:1px solid var(--bdr);border-radius:8px;font-size:13px;cursor:pointer">Cancelar</button>
      </div>
    </div>
    <!-- Historial -->
    <div id="inv-historial" style="display:none;margin-top:12px"></div>
  </div>
</div>

<script src="app.js"></script>

<footer style="text-align:center;padding:16px;font-size:11px;color:var(--gray);border-top:1px solid var(--bdr)">
  SENSARA, S.L. · Dashboard privado · Solo accesible con tu cuenta Google
</footer>
</body>
</html></html>
